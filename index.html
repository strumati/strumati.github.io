<!DOCTYPE html>
<html>
<head>
    <title>Open Source at Strumati</title>
    <style>
        :root{
            --b: #000000;
            --s: #0f0e1e;
            --g: #b4b4b4;
            --w: #fafafa;
        }
        body{
            margin: 0px;
        	background-color: var(--w);
            color: var(--b);
        }
        #b1{
            height: 175px;
            background-color: var(--s);
            color: var(--w);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'system-ui';
        }
        #b2{
            height: 25px;
            background-color: var(--g);
        }
        #b3{
            height: calc(100vh - 245px);
        }
        #b4{
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--g);
            height: 45px;
        }
        img{
            position: absolute;
            top: 10px;
            left: 10px;
            width: 50px;
            height: 50px;
        }
    </style>
</head>
<body>
	<div id="b1">
    	<h1>Open Source at Strumati</h1>
	</div>
    <div id="b2"></div>
    <div id="b3"></div>
    <div id="b4">Copyright 2025-2026 Strumati. All Rights Reserved.</div>
    <img src="https://strumati.github.io/logo.png" alt="Strumati Logo">
</body>
</html>
